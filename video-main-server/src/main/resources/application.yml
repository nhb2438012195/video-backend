#项目配置
server:
  port: ${server.port}
video :
  #视频存储桶
  bucket: public
  Exchange: video.exchange

  #  缓存超时时间，单位分钟
  timeout: 120
  #  最大分片大小10MB
  maxChunkSize : 11485760
  #下载文件临时文件目录
  videoTemporaryFile: E:/videoTemporaryFile/
  # minio中 DASH文件保存的路径
  dashFileSaveBucket: dash
  #上传队列
  uploadRoutingKey: video.upload
  uploadQueue: video.upload.queue
  #转码队列
  transcodeRoutingKey: video.transcode
  transcodeQueue: video.transcode.queue
  #消息保存队列
message:
  messageSaveQueue: video.message.save.queue
  messageSaveRoutingKey: video.message.save
  Exchange: video.exchange
#项目配置


spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${sky.datasource.driver-class-name}
      url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${sky.datasource.username}
      password: ${sky.datasource.password}
  servlet:
    multipart:
      max-file-size: 11MB
      max-request-size: 11MB
  redis:
    host: ${redis.host}
    port: ${redis.port}
    password: ${redis.password}
  rabbitmq:
    host: ${rabbitmq.host}       # RabbitMQ 地址
    port: ${rabbitmq.port}
    username: ${rabbitmq.username}
    password: ${rabbitmq.password}
    virtual-host: /
    messaging:
      stomp:
        # 允许客户端发送的自定义头（正则匹配）
        allowed-origin-patterns: "*"
mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true
#拦截器配置
security:
  permit-urls:
    - "/ws"
    - "/user/register"
    - "/user/login"
    - "/video/**"
    - "/swagger-ui/**"
    - "/v3/api-docs/**"
    - "/doc.html"
    - "/doc.html/**"
#日志配置
logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info
    org.springframework.web.socket: DEBUG
    org.springframework.messaging.simp: DEBUG
    org.springframework.web.socket.sockjs: DEBUG
jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: nhb2438012195
    # 设置jwt过期时间
    admin-ttl: 720000000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    user-secret-key:  nhb2438012195
    user-ttl: 720000000
    user-token-name: token

minio:
  endpoint: ${minio.endpoint}
  access-key: ${minio.access-key}
  secret-key: ${minio.secret-key}
  bucket-name: ${minio.bucket-name}

springdoc:
  api-docs:
    path: /v3/api-docs       # json 地址
  swagger-ui:
    path: /swagger-ui.html   # 原生 swagger 地址
  group-configs:
    - group: default
      packages-to-scan: com.nhb.controller   # 改成你的包
      paths-to-match: /**

knife4j:
  enable: true               # 开启 knife4j 增强
  setting:
    language: zh_cn          # 中文界面